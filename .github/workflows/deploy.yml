name: Deploy to Hostinger

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List what would change without uploading anything'
        type: boolean
        default: false

# Two deploys uploading at once would corrupt the sync-state file.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # The PHP API ships next to the built SPA so one upload covers both.
      # config.php holds the live DB credentials and stays on the server only.
      - name: Stage API alongside the build
        run: |
          mkdir -p dist/api
          rsync -a --exclude 'config.php' --exclude 'schema.sql' api/ dist/api/

      # Hostinger blocks SSH from datacenter IPs, so deploy over FTPS instead.
      # The action tracks only the files it uploads via a sync-state file on the
      # server, so it never touches the other sites in public_html (games/,
      # projects/, uploads/, ...) or api/config.php, which it never uploaded.
      # It does clean up old hashed bundles it previously uploaded to assets/.
      - name: Deploy over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dry-run: ${{ inputs.dry_run == true }}
          exclude: |
            **/.git*
            **/.git*/**
